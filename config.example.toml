[config_files]
trade_preferences_path = "config/trade_preferences.default.json"
constraints_path = "config/portfolio_constraints.default.json"

[persistence]
# LangGraph native checkpoint persistence. This stores graph execution metadata
# keyed by thread_id, including channel versions, pending sends, and next tasks.
checkpoint_enabled = true
checkpoint_path = "storage/langgraph_checkpoints.sqlite"

# Custom full-state snapshots written after streamed `values` chunks.
snapshot_enabled = true
snapshot_path = "storage/workflow_snapshots.sqlite"

# Long-term decision memory written once after the portfolio decision finishes.
decision_memory_enabled = true
memory_store_path = "storage/langgraph_memory.sqlite"

# SQLite database used by business audit tables, decision memory copies, trade
# outcomes, and paper execution records.
storage_path = "storage/trading_agents.sqlite"

[llm]
provider = "openai"
model = "gpt-5.5"

[paper_trading]
enable = false
provider = "alpaca"

[run]
# Single-ticker runner uses the first ticker; portfolio runner uses all tickers.
tickers = ["NVDA", "AAPL", "MSFT"]
# Empty string defaults to today's local date. Use YYYY-MM-DD to pin a date.
analysis_date = ""
research_turns = 2
risk_turns = 3
max_parallel_tickers = 5

[data_providers]
# default applies to sentiment/news/fundamentals unless a category overrides it.
default = "yahoo"
# Market can use sample, yahoo, or alpaca.
market = "alpaca"
sentiment = "yahoo"
news = "yahoo"
fundamentals = "yahoo"

[logging]
enabled = true
log_dir = "logs"

[reporting]
report_dir = "reports"

[portfolio]
max_revision_count = 2
single_ticker_failure_policy = "fail_fast" # fail_fast | skip_failed
